<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>4択クイズ</title>
  <style>
    :root {
      --bg: #f5f7f3;
      --surface: #ffffff;
      --text: #172021;
      --muted: #667376;
      --line: #d9e0dd;
      --primary: #14777b;
      --primary-dark: #0e5c60;
      --primary-soft: #dff3f1;
      --accent: #d96a37;
      --correct: #137a3b;
      --correct-soft: #e3f5ea;
      --wrong: #b3261e;
      --wrong-soft: #ffe7e2;
      --shadow: 0 18px 45px rgba(23, 32, 33, 0.12);
      --body-background:
        linear-gradient(135deg, rgba(20, 119, 123, 0.13), transparent 36%),
        linear-gradient(315deg, rgba(217, 106, 55, 0.12), transparent 34%),
        var(--bg);
      --panel-background: var(--surface);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--body-background);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      padding: 18px;
    }

    main {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .shell {
      min-height: calc(100vh - 36px);
      background: var(--panel-background);
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(217, 224, 221, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(20px, 4vw, 36px);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 7vw, 50px);
      line-height: 1.1;
    }

    h2 {
      margin: 28px 0 12px;
      font-size: 18px;
    }

    p {
      line-height: 1.65;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
    }

    .top-image {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 8px;
      margin: 22px 0 0;
      border: 1px solid var(--line);
      display: none;
    }

    .top-image[src]:not([src=""]) {
      display: block;
    }

    .notice {
      margin: 24px 0;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(217, 106, 55, 0.25);
      background: #fff3ec;
    }

    .notice h2 {
      margin: 0 0 6px;
      color: #8f3f1b;
    }

    .notice p {
      margin: 6px 0 0;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }

    .genre-unlock-row {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 4px;
    }

    .reserved-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .option-button,
    .choice,
    .primary-button,
    .secondary-button,
    .number-input {
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
    }

    .option-button {
      min-height: 54px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      cursor: pointer;
    }

    .option-button.selected {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .option-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .number-input {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--line);
      padding: 0 14px;
      color: var(--text);
      background: #fff;
    }

    .inline-input {
      margin-top: 12px;
      max-width: 220px;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .primary-button,
    .secondary-button {
      min-height: 50px;
      border: 0;
      padding: 0 20px;
      cursor: pointer;
    }

    .primary-button {
      background: var(--primary);
      color: #fff;
    }

    .primary-button:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    .secondary-button {
      background: #eef2ef;
      color: var(--text);
    }

    .primary-button:disabled,
    .secondary-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 12px;
    }

    .progress {
      height: 9px;
      background: #e8ede9;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--primary);
      transition: width 180ms ease;
    }

    .timer {
      margin-bottom: 22px;
      color: var(--accent);
      font-weight: 900;
    }

    .question {
      margin: 0 0 24px;
      font-size: clamp(21px, 4vw, 30px);
      line-height: 1.45;
      font-weight: 900;
    }

    .question-image {
      display: none;
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      margin: 0 0 18px;
    }

    .question-image[src]:not([src=""]) {
      display: block;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .choice {
      width: 100%;
      min-height: 62px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      display: grid;
      grid-template-columns: 34px 1fr 28px;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
    }

    .choice.has-image {
      align-items: start;
    }

    .choice:hover:not(:disabled) {
      border-color: var(--primary);
    }

    .choice:disabled {
      cursor: default;
    }

    .choice-letter {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 900;
    }

    .choice-text {
      overflow-wrap: anywhere;
    }

    .choice-content {
      display: grid;
      gap: 10px;
      align-items: center;
    }

    .choice-image {
      display: none;
      width: min(100%, 280px);
      max-height: 170px;
      object-fit: contain;
      justify-self: center;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .choice-image[src]:not([src=""]) {
      display: block;
    }

    .choice-mark {
      font-size: 22px;
      text-align: center;
    }

    .choice.correct {
      background: var(--correct-soft);
      border-color: transparent;
      color: var(--correct);
    }

    .choice.wrong {
      background: var(--wrong-soft);
      border-color: transparent;
      color: var(--wrong);
    }

    .answer {
      min-height: 98px;
      visibility: hidden;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid transparent;
    }

    .answer.visible {
      visibility: visible;
    }

    .answer.correct {
      background: var(--correct-soft);
      border-color: rgba(19, 122, 59, 0.25);
      color: var(--correct);
    }

    .answer.wrong {
      background: var(--wrong-soft);
      border-color: rgba(179, 38, 30, 0.25);
      color: var(--wrong);
    }

    .answer-title {
      margin: 0 0 6px;
      font-size: 19px;
      font-weight: 900;
    }

    .answer-text {
      margin: 0;
      color: var(--text);
    }

    .center {
      text-align: center;
    }

    .result-score {
      margin: 20px 0 8px;
      font-size: clamp(42px, 10vw, 74px);
      line-height: 1;
      font-weight: 900;
      color: var(--primary-dark);
    }

    .article-lines {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .article-lines p {
      margin: 0;
      padding: 12px 14px;
      border-left: 4px solid var(--primary);
      background: #f7faf8;
      border-radius: 6px;
    }

    .status {
      color: var(--muted);
      font-weight: 800;
    }

    body.auth-required {
      background:
        linear-gradient(90deg, rgba(8, 42, 29, 0.72), rgba(8, 42, 29, 0.22)),
        url("assets/login-background.png"),
        url("login-background.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    body.auth-required .shell {
      min-height: calc(100vh - 36px);
      display: grid;
      align-items: center;
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(12px);
    }

    .auth-view {
      width: min(430px, 100%);
      margin: 0 auto;
      color: #fff;
    }

    .auth-panel {
      padding: clamp(22px, 5vw, 34px);
      border-radius: 8px;
      background:
        linear-gradient(rgba(11, 45, 32, 0.78), rgba(11, 45, 32, 0.78)),
        url("assets/login-background.png"),
        url("login-background.png");
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.3);
    }

    .auth-panel h1 {
      font-size: clamp(30px, 8vw, 48px);
    }

    .auth-panel .lead {
      color: rgba(255, 255, 255, 0.82);
    }

    .auth-form {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .auth-input {
      min-height: 54px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
    }

    .auth-error {
      min-height: 22px;
      margin: 2px 0 0;
      color: #ffe1d8;
      font-weight: 800;
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .shell {
        min-height: calc(100vh - 20px);
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .genre-unlock-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .inline-input {
        max-width: none;
      }

      .actions {
        display: grid;
      }

      .primary-button,
      .secondary-button {
        width: 100%;
      }

      .choice {
        grid-template-columns: 32px 1fr 24px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <div id="authView" class="view active auth-view">
        <div class="auth-panel">
          <h1>合言葉を入力</h1>
          <p class="lead">クイズを始めるにはパスワードが必要です。</p>
          <form id="authForm" class="auth-form">
            <input id="passwordInput" class="auth-input" type="password" autocomplete="current-password" placeholder="パスワード">
            <button id="authButton" class="primary-button" type="submit">入る</button>
            <p id="authError" class="auth-error" aria-live="polite"></p>
          </form>
        </div>
      </div>

      <div id="homeView" class="view">
        <h1 id="appTitle" hidden></h1>
        <p id="appSubtitle" class="lead" hidden></p>
        <img id="topImage" class="top-image" src="" alt="">
        <div id="notice" class="notice" hidden></div>
        <p id="loadStatus" class="status">設定を読み込んでいます。</p>

        <h2>ジャンル</h2>
        <div id="genreButtons" class="button-grid"></div>

        <h2>問題数</h2>
        <div id="countButtons" class="button-grid"></div>
        <input id="customCountInput" class="number-input inline-input" type="number" inputmode="numeric" min="1" placeholder="任意の問題数" hidden>
        <p id="countHint" class="hint"></p>

        <h2>制限時間</h2>
        <div id="timerButtons" class="button-grid"></div>
        <input id="customTimerInput" class="number-input inline-input" type="number" inputmode="numeric" min="1" placeholder="任意の秒数" hidden>

        <h2 id="articleHeading" hidden>案内</h2>
        <div id="articleButtons" class="button-grid"></div>

        <div class="actions">
          <button id="startButton" class="primary-button" type="button" disabled>スタート</button>
          <button id="reviewButton" class="secondary-button" type="button" disabled>間違えた問題を復習</button>
          <button id="historyButton" class="secondary-button" type="button">履歴を見る</button>
          <button id="reloadButton" class="secondary-button" type="button">再読み込み</button>
        </div>
      </div>

      <div id="quizView" class="view">
        <div class="topbar">
          <span id="questionCount">Q1 / 10</span>
          <span id="scoreText">Score 0</span>
        </div>
        <div class="progress" aria-hidden="true">
          <span id="progressBar"></span>
        </div>
        <div id="timerText" class="timer"></div>
        <img id="questionImage" class="question-image" src="" alt="">
        <p id="questionText" class="question"></p>
        <div id="choices" class="choices"></div>
        <div id="answer" class="answer" aria-live="polite">
          <p id="answerTitle" class="answer-title"></p>
          <p id="answerText" class="answer-text"></p>
        </div>
        <div class="actions">
          <button id="nextButton" class="primary-button" type="button" disabled>次の問題へ</button>
          <button id="quitButton" class="secondary-button" type="button">TOPへ戻る</button>
        </div>
      </div>

      <div id="resultView" class="view center">
        <h1>結果</h1>
        <div id="resultScore" class="result-score"></div>
        <p id="resultMessage" class="lead"></p>
        <div class="actions">
          <button id="resultReviewButton" class="primary-button" type="button" disabled>間違えた問題を復習</button>
          <button id="homeButton" class="secondary-button" type="button">TOPへ戻る</button>
        </div>
      </div>

      <div id="articleView" class="view">
        <h1 id="articleTitle"></h1>
        <div id="articleLines" class="article-lines"></div>
        <div class="actions">
          <button id="articleBackButton" class="secondary-button" type="button">TOPへ戻る</button>
        </div>
      </div>

      <div id="historyView" class="view">
        <h1>履歴</h1>
        <h2>間違えた問題</h2>
        <div id="wrongHistoryLines" class="article-lines"></div>
        <h2>過去に出題された問題</h2>
        <div id="askedHistoryLines" class="article-lines"></div>
        <div class="actions">
          <button id="clearHistoryButton" class="secondary-button" type="button">履歴を消す</button>
          <button id="historyBackButton" class="secondary-button" type="button">TOPへ戻る</button>
        </div>
      </div>
    </section>
  </main>

    let authTokenExpiresAt = 0;

    function showView(view) {
      [authView, homeView, quizView, resultView, articleView, historyView].forEach((element) => {
        element.classList.remove('active');
      });
      view.classList.add('active');
    }

    async function api(action, params = {}) {
      if (!APPS_SCRIPT_URL) {
        return sampleApi(action, params);
      }

      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('action', action);
      const token = getAuthToken();
      if (token && !['authStatus', 'login'].includes(action)) {
        url.searchParams.set('token', token);
      }
      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      const response = await fetch(url.toString(), { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      if (data.error) {
        throw new Error(data.error);
      }

      return data;
    }

    function sampleApi(action, params) {
      if (action === 'authStatus') {
        return Promise.resolve({ passwordRequired: false });
      }

      if (action === 'login') {
        return Promise.resolve({ token: 'sample-token', expiresAt: Date.now() + 12 * 60 * 60 * 1000 });
      }

      if (action === 'config') {
        return Promise.resolve(sampleConfig);
      }

      if (action === 'questions') {
        const requestedSheets = String(params.sheets || params.sheet || '')
          .split(',')
          .filter(Boolean);
        const questions = requestedSheets.flatMap((sheet) => (
          sampleQuestions.map((question, index) => ({
            ...question,
            question: `${sampleConfig.genres.find((genre) => genre.sheet === sheet)?.label || 'サンプル'}: ${question.question}`,
            id: `${sheet}-${index}`
          }))
        ));
        return Promise.resolve({ questions });
      }

      if (action === 'article') {
        return Promise.resolve(sampleArticles[params.sheet]);
      }

      if (action === 'unlock') {
        const code = String(params.code || '').replace(/^#/, '');
        if (code === '5923') {
          return Promise.resolve({
            genres: [
              { label: '隠しジャンル', sheet: 't隠しジャンル#5923', count: 3 }
            ]
          });
        }
        return Promise.resolve({ genres: [] });
      }

      return Promise.reject(new Error('unknown_action'));
    }

    function getAuthToken() {
      if (!authToken || !authTokenExpiresAt || Date.now() >= authTokenExpiresAt) {
        authToken = '';
        authTokenExpiresAt = 0;
        return '';
      }
      return authToken;
    }

    function saveAuthToken(token, expiresAt) {
      authToken = token;
      authTokenExpiresAt = expiresAt;
    }

    function clearAuthToken() {
      authToken = '';
      authTokenExpiresAt = 0;
    }

    function showAuth(message = '') {
      document.body.classList.add('auth-required');
      authError.textContent = message;
      authButton.disabled = false;
      showView(authView);
      window.setTimeout(() => passwordInput.focus(), 0);
    }

    function showAppHome() {
      document.body.classList.remove('auth-required');
      showView(homeView);
    }

    async function initializeApp() {
      if (!APPS_SCRIPT_URL) {
        showAppHome();
        await loadConfig();
        return;
      }

      try {
        const status = await api('authStatus');
        if (!status.passwordRequired) {
          clearAuthToken();
          showAppHome();
          await loadConfig();
          return;
        }

        if (getAuthToken()) {
          showAppHome();
          await loadConfig();
          return;
        }

        showAuth();
      } catch (error) {
        showAuth(`認証設定の確認に失敗しました: ${error.message}`);
      }
    }

    async function submitPassword(event) {
      event.preventDefault();
      const password = passwordInput.value.trim();
      if (!password) {
        authError.textContent = 'パスワードを入力してください。';
        return;
      }

      authButton.disabled = true;
      authError.textContent = '確認しています。';

      try {
        const data = await api('login', { password });
        saveAuthToken(data.token, data.expiresAt);
        passwordInput.value = '';
        showAppHome();
        await loadConfig();
      } catch (error) {
        clearAuthToken();
        authError.textContent = error.message === 'invalid_password'
          ? 'パスワードが違います。'
          : `ログインに失敗しました: ${error.message}`;
      } finally {
        authButton.disabled = false;
      }
    }

    async function loadConfig() {
      loadStatus.textContent = '設定を読み込んでいます。';
      startButton.disabled = true;

      try {
        config = await api('config');
        applySettings(config.settings || {});
        unlockedGenres = [];
        mergeUnlockedGenres();
        selectedGenreSheets = new Set(config.genres.map((genre) => genre.sheet));
        renderHome();
        loadStatus.textContent = APPS_SCRIPT_URL ? '' : 'サンプルデータで表示中です。';
      } catch (error) {
        if (['auth_required', 'invalid_token', 'expired_token'].includes(error.message)) {
          clearAuthToken();
          showAuth('もう一度パスワードを入力してください。');
          return;
        }
        loadStatus.textContent = `読み込みに失敗しました: ${error.message}`;
      }
    }

    function applySettings(settings) {
      const titleText = getSetting(settings, ['タイトル', 'title', 'appTitle'], '');
      const subtitleText = getSetting(settings, ['サブタイトル', 'appSubtitle'], '');
      const titleVisible = getFlagFromSettings(settings, ['タイトルの表示', 'showTitle'], true) && titleText !== '';
      const subtitleVisible = getFlagFromSettings(settings, ['サブタイトルの表示', 'showSubtitle'], true) && subtitleText !== '';

      appTitle.textContent = titleText;
      appTitle.hidden = !titleVisible;
      appSubtitle.textContent = subtitleText;
      appSubtitle.hidden = !subtitleVisible;

      topImage.src = getSetting(settings, ['TOP画像', 'topImage'], '');
      topImage.alt = titleText || 'TOP画像';
      applyBackgroundSetting(document.body, '--body-background', getSetting(settings, ['外側背景', 'background'], ''), 'body');
      applyBackgroundSetting(document.documentElement, '--panel-background', getSetting(settings, ['枠内背景', 'panelBackground'], ''), 'panel');

      const defaultCountText = getSetting(settings, ['初期問題数', 'defaultQuestionCount'], '10');
      const defaultCount = parseInt(defaultCountText, 10);
      selectedCount = Number.isNaN(defaultCount) ? 10 : defaultCount;
      if (String(defaultCountText).toLowerCase() === 'all') {
        selectedCount = 'all';
      }

      const defaultTimeLimit = parseInt(getSetting(settings, ['初期制限時間', 'defaultTimeLimit'], '0'), 10);
      selectedTimer = Number.isNaN(defaultTimeLimit) ? 0 : defaultTimeLimit;
    }

    function getSetting(settings, keys, fallback = '') {
      for (const key of keys) {
        const value = settings[key];
        if (value !== undefined && value !== null && String(value).trim() !== '') {
          return String(value).trim();
        }
      }
      return fallback;
    }

    function getNumberSetting(keys, fallback) {
      const value = parseInt(getSetting(config.settings || {}, keys, String(fallback)), 10);
      return Number.isNaN(value) ? fallback : Math.max(value, 0);
    }

    function getFlagSetting(keys, fallback) {
      const value = getSetting(config.settings || {}, keys, fallback ? 't' : 'f').toLowerCase();
      return ['t', 'true', '1', 'yes', 'on', '表示'].includes(value);
    }

    function getFlagFromSettings(settings, keys, fallback) {
      const value = getSetting(settings, keys, fallback ? 't' : 'f').toLowerCase();
      return ['t', 'true', '1', 'yes', 'on', '表示'].includes(value);
    }

    function getWrongLimit() {
      return getNumberSetting(['間違えた問題の保存上限', 'wrongHistoryLimit'], DEFAULT_WRONG_LIMIT);
    }

    function getAskedLimit() {
      return getNumberSetting(['出題済み問題の保存上限', 'askedHistoryLimit'], DEFAULT_ASKED_LIMIT);
    }

    function shouldShowHistory() {
      return getFlagSetting(['履歴機能の表示', 'showHistory'], true);
    }

    function shouldShowReview() {
      return getFlagSetting(['復習ボタンの表示', 'showReview'], true);
    }

    function applyBackgroundSetting(target, propertyName, value, fallbackType) {
      const normalized = normalizeBackgroundValue(value, fallbackType);
      target.style.setProperty(propertyName, normalized);
    }

    function normalizeBackgroundValue(value, fallbackType) {
      const text = String(value || '').trim();
      if (!text) {
        return fallbackType === 'body'
          ? 'linear-gradient(135deg, rgba(20, 119, 123, 0.13), transparent 36%), linear-gradient(315deg, rgba(217, 106, 55, 0.12), transparent 34%), var(--bg)'
          : 'var(--surface)';
      }

      if (isLikelyImageUrl(text)) {
        return `url("${text.replace(/"/g, '\\"')}")`;
      }

      return normalizeColor(text);
    }

    function isLikelyImageUrl(value) {
      return /^https?:\/\//i.test(value)
        || /^data:image\//i.test(value)
        || /\.(png|jpe?g|webp|gif|svg)(\?.*)?$/i.test(value);
    }

    function normalizeColor(value) {
      if (/^[0-9a-f]{3}$/i.test(value) || /^[0-9a-f]{6}$/i.test(value)) {
        return `#${value}`;
      }

      return value;
    }

    function renderHome() {
      renderNotice();
      renderGenres();
      renderCounts();
      renderTimers();
      renderArticles();

      startButton.disabled = selectedGenreSheets.size === 0 || getSelectedTotalCount() === 0;
      reviewButton.hidden = !shouldShowReview();
      reviewButton.disabled = getStoredQuestions(WRONG_STORAGE_KEY).length === 0;
      historyButton.hidden = !shouldShowHistory();
    }

    function renderNotice() {
      const showNotice = getFlagSetting(['お知らせの表示', 'showNotice'], true);
      if (!showNotice || !config.notice) {
        notice.hidden = true;
        notice.innerHTML = '';
        return;
      }

      notice.hidden = false;
      const body = config.notice.body || [];
      notice.innerHTML = `
        <h2></h2>
        ${body.slice(0, 2).map(() => '<p></p>').join('')}
      `;
      notice.querySelector('h2').textContent = config.notice.title;
      [...notice.querySelectorAll('p')].forEach((p, index) => {
        p.textContent = body[index];
      });
    }

    function renderGenres() {
      mergeUnlockedGenres();
      genreButtons.innerHTML = '';
      const totalCount = getAllQuestionCount();
      const allSelected = selectedGenreSheets.size === config.genres.length && config.genres.length > 0;

      config.genres.forEach((genre) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `option-button ${selectedGenreSheets.has(genre.sheet) ? 'selected' : ''}`;
        button.textContent = `${genre.label}（${genre.count || 0}問）`;
        button.addEventListener('click', () => {
          if (selectedGenreSheets.has(genre.sheet)) {
            selectedGenreSheets.delete(genre.sheet);
          } else {
            selectedGenreSheets.add(genre.sheet);
          }
          normalizeSelectedCount();
          renderHome();
        });
        genreButtons.appendChild(button);
      });

      const unlockRow = document.createElement('div');
      unlockRow.className = 'genre-unlock-row';

      const allButton = document.createElement('button');
      allButton.type = 'button';
      allButton.className = `option-button ${allSelected ? 'selected' : ''}`;
      allButton.textContent = `すべて（${totalCount}問）`;
      allButton.addEventListener('click', () => {
        allGenreClickCount += 1;
        if (allGenreClickCount >= 5) {
          unlockInputVisible = true;
        }
        selectedGenreSheets = allSelected
          ? new Set()
          : new Set(config.genres.map((genre) => genre.sheet));
        normalizeSelectedCount();
        renderHome();
      });
      unlockRow.appendChild(allButton);

      const input = document.createElement('input');
      input.className = `number-input ${unlockInputVisible ? '' : 'reserved-hidden'}`;
      input.type = 'text';
      input.placeholder = '合言葉を入力';
      input.autocomplete = 'off';
      input.tabIndex = unlockInputVisible ? 0 : -1;
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          unlockHiddenGenres(input.value);
        }
      });
      unlockRow.appendChild(input);

      const unlockButton = document.createElement('button');
      unlockButton.type = 'button';
      unlockButton.className = `option-button ${unlockInputVisible ? '' : 'reserved-hidden'}`;
      unlockButton.textContent = '解除';
      unlockButton.tabIndex = unlockInputVisible ? 0 : -1;
      unlockButton.addEventListener('click', () => unlockHiddenGenres(input.value));
      unlockRow.appendChild(unlockButton);

      genreButtons.appendChild(unlockRow);
    }

    async function unlockHiddenGenres(code) {
      const normalizedCode = String(code || '').trim().replace(/^#/, '');
      if (!normalizedCode) {
        return;
      }

      try {
        const data = await api('unlock', { code: normalizedCode });
        const genres = data.genres || [];
        if (genres.length === 0) {
          loadStatus.textContent = '一致する隠しジャンルはありません。';
          return;
        }

        unlockedGenres = mergeGenreLists(unlockedGenres, genres);
        mergeUnlockedGenres();
        genres.forEach((genre) => selectedGenreSheets.add(genre.sheet));
        normalizeSelectedCount();
        loadStatus.textContent = `${genres.length}件の隠しジャンルを解除しました。`;
        renderHome();
      } catch (error) {
        loadStatus.textContent = `隠しジャンルの解除に失敗しました: ${error.message}`;
      }
    }

    function mergeUnlockedGenres() {
      config.genres = mergeGenreLists(config.genres || [], unlockedGenres);
    }

    function mergeGenreLists(baseGenres, extraGenres) {
      const map = new Map();
      [...baseGenres, ...extraGenres].forEach((genre) => {
        if (genre && genre.sheet) {
          map.set(genre.sheet, genre);
        }
      });
      return [...map.values()];
    }

    function renderCounts() {
      const maxCount = getSelectedTotalCount();
      countButtons.innerHTML = '';
      customCountInput.max = Math.max(maxCount, 1);
      customCountInput.disabled = maxCount === 0;
      customCountInput.hidden = !customCountActive;
      countHint.textContent = maxCount > 0
        ? `選択中のジャンルは合計${maxCount}問です。任意入力は1〜${maxCount}まで使えます。`
        : 'ジャンルを選ぶと問題数を指定できます。';

      questionCountOptions.forEach((option) => {
        const button = document.createElement('button');
        button.type = 'button';
        const isSelected = option.value === 'custom'
          ? customCountActive
          : selectedCount === option.value && !customCountActive;
        button.className = `option-button ${isSelected ? 'selected' : ''}`;
        button.textContent = option.value === 'all' ? `全問（${maxCount}問）` : option.label;
        button.disabled = maxCount === 0 || (typeof option.value === 'number' && option.value > maxCount);
        button.addEventListener('click', () => {
          if (option.value === 'custom') {
            customCountActive = true;
            if (!customCountInput.value) {
              customCountInput.value = String(Math.min(10, Math.max(maxCount, 1)));
            }
            selectedCount = parseInt(customCountInput.value, 10);
            renderHome();
            customCountInput.focus();
            return;
          }
          customCountActive = false;
          selectedCount = option.value;
          customCountInput.value = '';
          renderHome();
        });
        countButtons.appendChild(button);
      });

      if (typeof selectedCount === 'number' && customCountInput.value) {
        customCountInput.value = String(Math.min(Math.max(selectedCount, 1), Math.max(maxCount, 1)));
      }
    }

    function renderTimers() {
      timerButtons.innerHTML = '';
      customTimerInput.hidden = !customTimerActive;

      timerOptions.forEach((option) => {
        const button = document.createElement('button');
        button.type = 'button';
        const isSelected = option.value === 'custom'
          ? customTimerActive
          : selectedTimer === option.value && !customTimerActive;
        button.className = `option-button ${isSelected ? 'selected' : ''}`;
        button.textContent = option.label;
        button.addEventListener('click', () => {
          if (option.value === 'custom') {
            customTimerActive = true;
            if (!customTimerInput.value) {
              customTimerInput.value = '45';
            }
            selectedTimer = Math.max(parseInt(customTimerInput.value, 10) || 1, 1);
            renderHome();
            customTimerInput.focus();
            return;
          }
          customTimerActive = false;
          selectedTimer = option.value;
          customTimerInput.value = '';
          renderHome();
        });
        timerButtons.appendChild(button);
      });
    }

    function renderOptionButtons(container, options, selectedValue, onSelect) {
      container.innerHTML = '';

      options.forEach((option) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'option-button';
        button.textContent = option.label;
        const value = option.sheet || option.value;
        if (value === selectedValue) {
          button.classList.add('selected');
        }
        button.addEventListener('click', () => onSelect(option));
        container.appendChild(button);
      });
    }

    function renderArticles() {
      const articles = config.articles || [];
      articleButtons.innerHTML = '';
      articleHeading.hidden = articles.length === 0;

      articles.forEach((article) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'option-button';
        button.textContent = article.label;
        button.addEventListener('click', () => openArticle(article));
        articleButtons.appendChild(button);
      });
    }

    function getAllQuestionCount() {
      return config.genres.reduce((sum, genre) => sum + Number(genre.count || 0), 0);
    }

    function getSelectedTotalCount() {
      return config.genres.reduce((sum, genre) => (
        selectedGenreSheets.has(genre.sheet) ? sum + Number(genre.count || 0) : sum
      ), 0);
    }

    function normalizeSelectedCount() {
      const maxCount = getSelectedTotalCount();
      if (selectedCount !== 'all' && selectedCount > maxCount) {
        selectedCount = maxCount || 1;
      }
      if (customCountActive && customCountInput.value) {
        const value = parseInt(customCountInput.value, 10);
        customCountInput.value = String(Math.min(Math.max(value || 1, 1), Math.max(maxCount, 1)));
        selectedCount = parseInt(customCountInput.value, 10);
      }
    }

    async function startQuiz({ review = false } = {}) {
      try {
        if (review) {
          activeQuestions = shuffle(getStoredQuestions(WRONG_STORAGE_KEY)).map(cloneQuestion);
        } else {
          const sheets = [...selectedGenreSheets].join(',');
          const data = await api('questions', { sheets });
          const shuffledQuestions = shuffle(data.questions.map(cloneQuestion));
          activeQuestions = selectedCount === 'all'
            ? shuffledQuestions
            : shuffledQuestions.slice(0, Math.min(selectedCount, shuffledQuestions.length));
          wrongQuestions = [];
        }

        if (activeQuestions.length === 0) {
          loadStatus.textContent = '出題できる問題がありません。';
          showView(homeView);
          return;
        }

        currentIndex = 0;
        score = 0;
        answered = false;
        showView(quizView);
        renderQuestion();
      } catch (error) {
        loadStatus.textContent = `問題の読み込みに失敗しました: ${error.message}`;
        showView(homeView);
      }
    }

    function cloneQuestion(question) {
      return {
        question: question.question,
        genre: question.genre || '',
        image: question.image || '',
        choices: shuffle(question.choices),
        explanation: question.explanation || '',
      };
    }

    function renderQuestion() {
      clearTimer();
      const current = activeQuestions[currentIndex];
      answered = false;
      questionCount.textContent = `Q${currentIndex + 1} / ${activeQuestions.length}`;
      scoreText.textContent = `Score ${score}`;
      progressBar.style.width = `${((currentIndex + 1) / activeQuestions.length) * 100}%`;
      questionImage.src = current.image || '';
      questionImage.alt = current.image ? current.question : '';
      questionText.textContent = current.question;
      choicesElement.innerHTML = '';
      answer.className = 'answer';
      answerTitle.textContent = '';
      answerText.textContent = '';
      nextButton.disabled = true;
      nextButton.textContent = currentIndex === activeQuestions.length - 1 ? '結果を見る' : '次の問題へ';

      current.choices.forEach((choice, index) => {
        const button = document.createElement('button');
        button.className = `choice ${choice.image ? 'has-image' : ''}`;
        button.type = 'button';
        button.innerHTML = `
          <span class="choice-letter">${String.fromCharCode(65 + index)}</span>
          <span class="choice-content">
            <img class="choice-image" src="" alt="">
            <span class="choice-text"></span>
          </span>
          <span class="choice-mark" aria-hidden="true"></span>
        `;
        const image = button.querySelector('.choice-image');
        image.src = choice.image || '';
        image.alt = choice.text || `選択肢${String.fromCharCode(65 + index)}の画像`;
        button.querySelector('.choice-text').textContent = choice.text;
        button.addEventListener('click', () => selectAnswer(index, false));
        choicesElement.appendChild(button);
      });

      startTimer();
    }

    function startTimer() {
      if (!selectedTimer) {
        timerText.textContent = '';
        return;
      }

      remainingSeconds = selectedTimer;
      timerText.textContent = `残り ${remainingSeconds} 秒`;
      timerId = window.setInterval(() => {
        remainingSeconds -= 1;
        timerText.textContent = `残り ${remainingSeconds} 秒`;

        if (remainingSeconds <= 0) {
          selectAnswer(-1, true);
        }
      }, 1000);
    }

    function clearTimer() {
      if (timerId) {
        window.clearInterval(timerId);
        timerId = null;
      }
    }

    function selectAnswer(selectedIndex, timedOut) {
      if (answered) {
        return;
      }

      clearTimer();
      answered = true;
      const current = activeQuestions[currentIndex];
      const correctIndex = current.choices.findIndex((choice) => choice.correct);
      const isCorrect = selectedIndex === correctIndex;

      if (isCorrect) {
        score += 1;
      } else {
        wrongQuestions.push(current);
        saveQuestionToStorage(WRONG_STORAGE_KEY, current, getWrongLimit());
      }

      saveQuestionToStorage(ASKED_STORAGE_KEY, current, getAskedLimit());

      [...choicesElement.children].forEach((button, index) => {
        button.disabled = true;
        const mark = button.querySelector('.choice-mark');
        if (index === correctIndex) {
          button.classList.add('correct');
          mark.textContent = '✓';
        } else if (index === selectedIndex) {
          button.classList.add('wrong');
          mark.textContent = '×';
        }
      });

      const correctText = current.choices[correctIndex].text;
      answer.className = `answer visible ${isCorrect ? 'correct' : 'wrong'}`;
      answerTitle.textContent = isCorrect ? '正解！' : timedOut ? '時間切れ' : '不正解';
      answerText.textContent = current.explanation || `正解は「${correctText}」です。`;
      scoreText.textContent = `Score ${score}`;
      nextButton.disabled = false;
    }

    function goNext() {
      if (!answered) {
        return;
      }

      if (currentIndex === activeQuestions.length - 1) {
        showResult();
        return;
      }

      currentIndex += 1;
      renderQuestion();
    }

    function showResult() {
      clearTimer();
      reviewQuestions = wrongQuestions.map(cloneQuestion);
      const rate = score / activeQuestions.length;
      let message = '伸びしろたっぷりです。復習しましょう。';

      if (rate === 1) {
        message = '満点です。すばらしい！';
      } else if (rate >= 0.7) {
        message = 'かなりの正答率です。';
      } else if (rate >= 0.4) {
        message = 'いい感じです。復習でもう一段上へ。';
      }

      resultScore.textContent = `${score} / ${activeQuestions.length}`;
      resultMessage.textContent = message;
      resultReviewButton.hidden = !shouldShowReview();
      resultReviewButton.disabled = getStoredQuestions(WRONG_STORAGE_KEY).length === 0;
      renderHome();
      showView(resultView);
    }

    async function openArticle(article) {
      try {
        const data = await api('article', { sheet: article.sheet });
        articleTitle.textContent = data.title;
        articleLines.innerHTML = '';

        data.lines.forEach((line) => {
          const p = document.createElement('p');
          p.textContent = line;
          articleLines.appendChild(p);
        });

        showView(articleView);
      } catch (error) {
        loadStatus.textContent = `案内の読み込みに失敗しました: ${error.message}`;
        showView(homeView);
      }
    }

    function openHistory() {
      renderHistoryList(wrongHistoryLines, getStoredQuestions(WRONG_STORAGE_KEY), '間違えた問題はまだありません。');
      renderHistoryList(askedHistoryLines, getStoredQuestions(ASKED_STORAGE_KEY), '出題履歴はまだありません。');
      showView(historyView);
    }

    function renderHistoryList(container, items, emptyText) {
      container.innerHTML = '';

      if (items.length === 0) {
        const p = document.createElement('p');
        p.textContent = emptyText;
        container.appendChild(p);
        return;
      }

      [...items].reverse().forEach((item) => {
        const p = document.createElement('p');
        const genre = item.genre ? `【${item.genre}】` : '';
        p.textContent = `${genre}${item.question}`;
        container.appendChild(p);
      });
    }

    function saveQuestionToStorage(storageKey, question, limit) {
      const items = getStoredQuestions(storageKey);
      const normalized = normalizeQuestionForStorage(question);
      const nextItems = items.filter((item) => item.key !== normalized.key);
      nextItems.push(normalized);

      while (nextItems.length > limit) {
        nextItems.shift();
      }

      localStorage.setItem(storageKey, JSON.stringify(nextItems));
    }

    function getStoredQuestions(storageKey) {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function normalizeQuestionForStorage(question) {
      const correct = question.choices.find((choice) => choice.correct) || {};
      const wrongChoices = question.choices
        .filter((choice) => !choice.correct)
        .map((choice) => ({
          text: choice.text || '',
          image: choice.image || ''
        }))
        .sort((a, b) => `${a.text}|${a.image}`.localeCompare(`${b.text}|${b.image}`));
      const key = [
        question.genre || '',
        question.question,
        question.image || '',
        correct.text || '',
        correct.image || '',
        ...wrongChoices.map((choice) => `${choice.text}|${choice.image}`)
      ].join('|');

      return {
        key,
        genre: question.genre || '',
        question: question.question,
        image: question.image || '',
        choices: [
          { text: correct.text || '', image: correct.image || '', correct: true },
          ...wrongChoices.map((choice) => ({ text: choice.text, image: choice.image, correct: false }))
        ],
        explanation: question.explanation || '',
        savedAt: new Date().toISOString()
      };
    }

    function clearHistory() {
      localStorage.removeItem(WRONG_STORAGE_KEY);
      localStorage.removeItem(ASKED_STORAGE_KEY);
      reviewQuestions = [];
      renderHome();
      openHistory();
    }

    function shuffle(array) {
      const copied = [...array];
      for (let index = copied.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copied[index], copied[randomIndex]] = [copied[randomIndex], copied[index]];
      }
      return copied;
    }

    customCountInput.addEventListener('input', () => {
      const maxCount = getSelectedTotalCount();
      const value = parseInt(customCountInput.value, 10);
      if (Number.isNaN(value)) {
        selectedCount = 10;
        renderHome();
        return;
      }
      selectedCount = Math.min(Math.max(value, 1), Math.max(maxCount, 1));
      customCountInput.value = String(selectedCount);
      renderHome();
    });

    customTimerInput.addEventListener('input', () => {
      const value = parseInt(customTimerInput.value, 10);
      if (Number.isNaN(value)) {
        selectedTimer = 1;
        renderHome();
        return;
      }
      selectedTimer = Math.max(value, 1);
      customTimerInput.value = String(selectedTimer);
      renderHome();
    });

    startButton.addEventListener('click', () => startQuiz());
    reviewButton.addEventListener('click', () => startQuiz({ review: true }));
    resultReviewButton.addEventListener('click', () => startQuiz({ review: true }));
    historyButton.addEventListener('click', openHistory);
    clearHistoryButton.addEventListener('click', clearHistory);
    reloadButton.addEventListener('click', loadConfig);
    authForm.addEventListener('submit', submitPassword);
    nextButton.addEventListener('click', goNext);
    quitButton.addEventListener('click', () => {
      clearTimer();
      showView(homeView);
    });
    homeButton.addEventListener('click', () => showView(homeView));
    articleBackButton.addEventListener('click', () => showView(homeView));
    historyBackButton.addEventListener('click', () => showView(homeView));

    initializeApp();
  </script>
</body>
